{% extends "_layout.html" %}
{% block content %}
<main class="flex-grow w-full pb-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 text-sm text-gray-500">
        <a href="/index.html" class="hover:text-black">Home</a>
        <span class="mx-2">/</span>
        <span class="text-black font-medium">Contact</span>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row gap-8">

            <div class="w-full lg:w-1/3 bg-white p-8 rounded border border-gray-100 flex flex-col justify-center space-y-8" style="box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                <div>
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-medium text-black">Call us</h3>
                    </div>
                    <div class="pl-14 space-y-4 text-sm text-gray-800">
                        <p>We are available 24/7, 7 days a week.</p>
                        <p>Phone : +8801611112222</p>
                    </div>
                </div>

                <div class="h-px w-full bg-gray-300"></div>

                <div>
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-medium text-black">Write to us</h3>
                    </div>
                    <div class="pl-14 space-y-4 text-sm text-gray-800">
                        <p>Fill out our form and we will contact you within 24 hours.</p>
                        <p>Emails : customer@exclusive.com</p>
                        <p>Emails : support@exclusive.com</p>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-2/3 bg-white p-8 rounded border border-gray-100" style="box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                <form action="/contact/send" method="POST">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <input type="text" name="name" placeholder="Your Name *" required
                            class="bg-secondary rounded px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-gray-300 w-full placeholder-gray-500">
                        <input type="email" name="email" placeholder="Your Email *" required
                            class="bg-secondary rounded px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-gray-300 w-full placeholder-gray-500">
                        <input type="tel" name="phone" placeholder="Your Phone *"
                            class="bg-secondary rounded px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-gray-300 w-full placeholder-gray-500">
                    </div>
                    <div class="mb-4">
                        <textarea name="message" placeholder="Your Message" rows="8"
                            class="bg-secondary rounded px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-gray-300 w-full placeholder-gray-500 resize-none"></textarea>
                    </div>
                    <div class="flex justify-end">
                        <button type="submit"
                            class="bg-primary text-white px-10 py-3 rounded font-medium hover:bg-red-600 transition text-sm">Send Message</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</main>
{% endblock %}
