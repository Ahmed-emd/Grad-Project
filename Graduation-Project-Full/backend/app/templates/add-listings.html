{% extends "_layout.html" %}
{% block content %}
<main class="flex-grow w-full pb-20 pt-10">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-4 mb-8">
      <a href="/my-listings.html" class="text-gray-400 hover:text-gray-700 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-3xl font-bold tracking-tight">Add Listing</h1>
    </div>

    <form method="post" action="/seller/listings/add" enctype="multipart/form-data" class="space-y-6">

      <!-- Title -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
        <input name="name" type="text" required placeholder="e.g. Wireless Headphones"
          class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-red-500">*</span></label>
        <textarea name="description" required rows="4" placeholder="Describe your product..."
          class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary resize-none"></textarea>
      </div>

      <!-- Price + Category row -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Price (EGP) <span class="text-red-500">*</span></label>
          <input name="price" type="number" min="0" step="0.01" required placeholder="0.00"
            class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category <span class="text-red-500">*</span></label>
          <select name="category" id="category-select" required onchange="onCategoryChange(this.value)"
            class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
            <option value="">Select...</option>
            <option value="Electronics">Electronics</option>
            <option value="Gaming">Gaming</option>
            <option value="Home">Home</option>
            <option value="Fashion">Fashion</option>
            <option value="Sports">Sports</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Electronics -->
      <div id="extra-Electronics" class="extra-fields hidden space-y-4 border border-gray-100 rounded-lg p-4 bg-gray-50">
        <p class="text-xs font-semibold uppercase tracking-widest text-gray-400">Electronics details</p>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
            <input name="brand" type="text" placeholder="e.g. Samsung"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Model / SKU</label>
            <input name="model" type="text" placeholder="e.g. SM-A546"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Condition</label>
            <select name="condition"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="New">New</option>
              <option value="Like New">Like New</option>
              <option value="Good">Good</option>
              <option value="Fair">Fair</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Warranty</label>
            <input name="warranty" type="text" placeholder="e.g. 1 year manufacturer"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
        </div>
      </div>

      <!-- Gaming -->
      <div id="extra-Gaming" class="extra-fields hidden space-y-4 border border-gray-100 rounded-lg p-4 bg-gray-50">
        <p class="text-xs font-semibold uppercase tracking-widest text-gray-400">Gaming details</p>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Platform</label>
            <select name="platform"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="PC">PC</option>
              <option value="PlayStation">PlayStation</option>
              <option value="Xbox">Xbox</option>
              <option value="Nintendo Switch">Nintendo Switch</option>
              <option value="Mobile">Mobile</option>
              <option value="Multi-platform">Multi-platform</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Genre</label>
            <input name="genre" type="text" placeholder="e.g. Action, RPG, FPS"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Condition</label>
            <select name="condition"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="New">New (sealed)</option>
              <option value="Like New">Like New</option>
              <option value="Good">Good</option>
              <option value="Fair">Fair</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Age Rating</label>
            <select name="age_rating"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="E">Everyone</option>
              <option value="T">Teen (13+)</option>
              <option value="M">Mature (17+)</option>
              <option value="AO">Adults Only</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Home -->
      <div id="extra-Home" class="extra-fields hidden space-y-4 border border-gray-100 rounded-lg p-4 bg-gray-50">
        <p class="text-xs font-semibold uppercase tracking-widest text-gray-400">Home & furniture details</p>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Material</label>
            <input name="material" type="text" placeholder="e.g. Wood, Fabric, Metal"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
            <input name="color" type="text" placeholder="e.g. Beige, White"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Dimensions (L × W × H cm)</label>
          <input name="dimensions" type="text" placeholder="e.g. 120 × 60 × 75"
            class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Room Type</label>
            <select name="room_type"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="Living Room">Living Room</option>
              <option value="Bedroom">Bedroom</option>
              <option value="Kitchen">Kitchen</option>
              <option value="Bathroom">Bathroom</option>
              <option value="Office">Office</option>
              <option value="Outdoor">Outdoor</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Assembly Required?</label>
            <select name="assembly_required"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Fashion -->
      <div id="extra-Fashion" class="extra-fields hidden space-y-4 border border-gray-100 rounded-lg p-4 bg-gray-50">
        <p class="text-xs font-semibold uppercase tracking-widest text-gray-400">Fashion details</p>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Size</label>
            <select name="size"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="XS">XS</option>
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="XXL">XXL</option>
              <option value="One Size">One Size</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Color</label>
            <input name="color" type="text" placeholder="e.g. Navy Blue"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
            <select name="gender"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="Men">Men</option>
              <option value="Women">Women</option>
              <option value="Unisex">Unisex</option>
              <option value="Kids">Kids</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
            <input name="brand" type="text" placeholder="e.g. Zara, H&M"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Material / Fabric</label>
            <input name="material" type="text" placeholder="e.g. 100% Cotton"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Condition</label>
          <select name="condition"
            class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
            <option value="">Select...</option>
            <option value="New with tags">New with tags</option>
            <option value="New without tags">New without tags</option>
            <option value="Like New">Like New</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
          </select>
        </div>
      </div>

      <!-- Sports -->
      <div id="extra-Sports" class="extra-fields hidden space-y-4 border border-gray-100 rounded-lg p-4 bg-gray-50">
        <p class="text-xs font-semibold uppercase tracking-widest text-gray-400">Sports & outdoors details</p>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Sport / Activity</label>
            <input name="sport" type="text" placeholder="e.g. Football, Swimming, Cycling"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
            <input name="brand" type="text" placeholder="e.g. Nike, Adidas"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Size / Weight</label>
            <input name="size" type="text" placeholder="e.g. L, 10kg, 27-inch"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Condition</label>
            <select name="condition"
              class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
              <option value="">Select...</option>
              <option value="New">New</option>
              <option value="Like New">Like New</option>
              <option value="Good">Good</option>
              <option value="Fair">Fair</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Indoor / Outdoor Use</label>
          <select name="use_type"
            class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
            <option value="">Select...</option>
            <option value="Indoor">Indoor</option>
            <option value="Outdoor">Outdoor</option>
            <option value="Both">Both</option>
          </select>
        </div>
      </div>

      <!-- Other -->
      <div id="extra-Other" class="extra-fields hidden space-y-4 border border-gray-100 rounded-lg p-4 bg-gray-50">
        <p class="text-xs font-semibold uppercase tracking-widest text-gray-400">Additional details</p>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Condition</label>
          <select name="condition"
            class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary bg-white">
            <option value="">Select...</option>
            <option value="New">New</option>
            <option value="Like New">Like New</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Additional Notes</label>
          <input name="extra_notes" type="text" placeholder="Any other relevant details..."
            class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
        </div>
      </div>

      <!-- Stock -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Stock Quantity <span class="text-red-500">*</span></label>
        <input name="stock_qty" type="number" min="1" required placeholder="1"
          class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary">
      </div>

      <!-- Image Upload -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Product Image <span class="text-red-500">*</span></label>
        <div id="drop-zone"
          class="relative border-2 border-dashed border-gray-300 rounded-lg p-6 flex flex-col items-center justify-center gap-2 cursor-pointer hover:border-primary transition-colors"
          onclick="document.getElementById('image-input').click()"
          ondragover="event.preventDefault(); this.classList.add('border-primary','bg-red-50')"
          ondragleave="this.classList.remove('border-primary','bg-red-50')"
          ondrop="handleDrop(event)">
          <svg id="upload-icon" class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M4 16l4-4a3 3 0 014 0l4 4m-4-8v8m-8 4h16a2 2 0 002-2V6a2 2 0 00-2-2H4a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <p class="text-sm text-gray-500">Drag & drop or <span class="text-primary font-medium">browse</span></p>
          <p class="text-xs text-gray-400">JPG, PNG, WEBP — max 10 MB</p>
          <input id="image-input" name="image_file" type="file" accept="image/jpeg,image/png,image/webp,image/gif" required
            class="hidden" onchange="previewFile(this)">
        </div>
        <div id="img-preview" class="mt-3 hidden relative">
          <img id="preview-img" src="" alt="Preview"
            class="w-full h-52 object-cover rounded border border-gray-200">
          <button type="button" onclick="clearImage()"
            class="absolute top-2 right-2 bg-white rounded-full p-1 shadow text-gray-500 hover:text-red-500 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="pt-2">
        <button type="submit"
          class="w-full bg-primary text-white font-medium py-3.5 rounded hover:bg-red-600 transition">
          Publish Listing
        </button>
      </div>
    </form>
  </div>
</main>

<script>
  function onCategoryChange(val) {
    document.querySelectorAll('.extra-fields').forEach(el => el.classList.add('hidden'));
    if (val) {
      const target = document.getElementById('extra-' + val);
      if (target) target.classList.remove('hidden');
    }
  }

  function previewFile(input) {
    const file = input.files[0];
    if (!file) return;
    showPreview(URL.createObjectURL(file));
  }

  function handleDrop(event) {
    event.preventDefault();
    const zone = document.getElementById('drop-zone');
    zone.classList.remove('border-primary', 'bg-red-50');
    const file = event.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const input = document.getElementById('image-input');
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    showPreview(URL.createObjectURL(file));
  }

  function showPreview(src) {
    document.getElementById('preview-img').src = src;
    document.getElementById('img-preview').classList.remove('hidden');
    document.getElementById('upload-icon').classList.add('hidden');
  }

  function clearImage() {
    document.getElementById('image-input').value = '';
    document.getElementById('preview-img').src = '';
    document.getElementById('img-preview').classList.add('hidden');
    document.getElementById('upload-icon').classList.remove('hidden');
  }
</script>
{% endblock %}
