{% extends "_layout.html" %}
{% block content %}
<main class="flex-grow flex flex-col items-center justify-center w-full px-4 py-32 bg-white">
  <h1 class="text-[32px] font-semibold mb-4 text-black tracking-tight">Order Confirmed</h1>
  <p class="text-[15px] text-black font-light mb-12">
    Thank you for your purchase. Your order number is #{{ order.id }}.
  </p>

  <div class="flex items-center space-x-6">
    <a href="/orders.html"
      class="border border-gray-400 text-black px-12 py-3.5 hover:bg-gray-50 transition duration-300 text-[15px] font-medium rounded-sm">
      View Orders
    </a>
    <a href="/index.html"
      class="bg-[#DB4444] text-white px-12 py-3.5 hover:bg-[#c33333] transition duration-300 text-[15px] font-medium rounded-sm">
      Continue Shopping
    </a>
  </div>
</main>
{% endblock %}
